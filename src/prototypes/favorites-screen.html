<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BexieMart — Favorites</title>
<link href="https://fonts.googleapis.com/css2?family=Raleway:wght@400;600;700&family=Nunito:wght@400;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #FFFFFF;
    --surface: #FFFFFF;
    --fg: #111322;
    --muted: #5F6C7B;
    --border: #E4E7EC;
    --accent: #004CFF;
    --font-display: 'Raleway', Georgia, serif;
    --font-body: 'Nunito', -apple-system, BlinkMacSystemFont, 'SF Pro Text', system-ui, sans-serif;
    --radius: 12px;
    --radius-sm: 8px;
    --radius-lg: 16px;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: var(--font-body);
    background: #1a1a2e;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    padding: 20px;
  }

  /* iPhone 15 Pro Frame */
  .iphone-frame {
    width: 393px;
    height: 852px;
    background: #000;
    border-radius: 55px;
    padding: 12px;
    position: relative;
    box-shadow: 0 25px 50px rgba(0,0,0,0.5);
  }

  .iphone-screen {
    width: 100%;
    height: 100%;
    background: var(--bg);
    border-radius: 44px;
    overflow: hidden;
    position: relative;
    display: flex;
    flex-direction: column;
  }

  /* Dynamic Island */
  .dynamic-island {
    position: absolute;
    top: 11px;
    left: 50%;
    transform: translateX(-50%);
    width: 126px;
    height: 36px;
    background: #000;
    border-radius: 20px;
    z-index: 100;
  }

  /* Status Bar */
  .status-bar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 14px 28px 0;
    height: 54px;
    position: relative;
    z-index: 50;
  }

  .status-time {
    font-size: 15px;
    font-weight: 600;
    color: var(--fg);
    letter-spacing: 0.5px;
  }

  .status-icons {
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .status-icons svg {
    width: 18px;
    height: 18px;
    fill: var(--fg);
  }

  /* Content Area */
  .content {
    flex: 1;
    overflow-y: auto;
    overflow-x: hidden;
    padding-bottom: 0;
  }

  .content::-webkit-scrollbar { display: none; }

  /* Header */
  .header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 12px 20px 16px;
  }

  .header-left {
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .header-heart {
    width: 24px;
    height: 24px;
    fill: #B3261E;
    flex-shrink: 0;
  }

  .header-title {
    font-family: var(--font-display);
    font-size: 22px;
    font-weight: 700;
    color: var(--fg);
    letter-spacing: -0.3px;
  }

  .count-badge {
    background: #EEF2FF;
    color: var(--fg);
    padding: 6px 14px;
    border-radius: 20px;
    font-size: 14px;
    font-weight: 700;
    min-width: 44px;
    text-align: center;
  }

  /* Product Grid */
  .grid-2 {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
    padding: 0 20px 20px;
  }

  .card {
    background: var(--surface);
    border-radius: var(--radius);
    border: 1px solid var(--border);
    overflow: hidden;
    display: flex;
    flex-direction: column;
  }

  .ph-img {
    width: 100%;
    aspect-ratio: 1 / 1;
    background: linear-gradient(135deg, #E4E7EC 0%, #F5F6F8 100%);
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
  }

  .ph-img svg {
    width: 40px;
    height: 40px;
    stroke: var(--muted);
    fill: none;
    stroke-width: 1.5;
    opacity: 0.5;
  }

  .card-body {
    padding: 10px 12px 12px;
    flex: 1;
    display: flex;
    flex-direction: column;
  }

  .card-name {
    font-size: 13px;
    font-weight: 600;
    color: var(--fg);
    line-height: 1.3;
    display: -webkit-box;
    -webkit-line-clamp: 2;
    -webkit-box-orient: vertical;
    overflow: hidden;
    margin-bottom: 6px;
    min-height: 34px;
  }

  .card-price {
    font-size: 15px;
    font-weight: 700;
    color: var(--accent);
    margin-top: auto;
  }

  .num { font-variant-numeric: tabular-nums; }

  .card-fav {
    position: absolute;
    top: 8px;
    right: 8px;
    width: 32px;
    height: 32px;
    display: flex;
    align-items: center;
    justify-content: center;
    background: rgba(255,255,255,0.9);
    border-radius: 50%;
    border: none;
    cursor: pointer;
    min-width: 44px;
    min-height: 44px;
  }

  .card-fav svg {
    width: 16px;
    height: 16px;
    fill: #B3261E;
    stroke: none;
  }

  /* Tab Bar */
  .tabbar {
    display: flex;
    justify-content: space-around;
    align-items: flex-start;
    padding: 8px 0 28px;
    background: var(--surface);
    border-top: 1px solid var(--border);
    flex-shrink: 0;
  }

  .tab-item {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 4px;
    background: none;
    border: none;
    cursor: pointer;
    padding: 4px 12px;
    min-width: 64px;
    min-height: 44px;
  }

  .tab-item svg {
    width: 24px;
    height: 24px;
    stroke: var(--muted);
    fill: none;
    stroke-width: 2;
  }

  .tab-item.active svg {
    stroke: var(--accent);
    fill: none;
  }

  .tab-item span {
    font-size: 10px;
    font-weight: 600;
    color: var(--muted);
  }

  .tab-item.active span {
    color: var(--accent);
  }

  .tab-item.active svg.fav-tab-icon {
    fill: var(--accent);
    stroke: none;
  }

  .fav-tab-icon {
    fill: var(--accent);
    stroke: none;
  }

  /* Home Indicator */
  .home-indicator {
    position: absolute;
    bottom: 8px;
    left: 50%;
    transform: translateX(-50%);
    width: 134px;
    height: 5px;
    background: var(--fg);
    border-radius: 3px;
    z-index: 200;
  }

  /* Section IDs */
  [data-od-id] { position: relative; }
</style>
</head>
<body>

<div class="iphone-frame">
  <div class="iphone-screen">

    <!-- Dynamic Island -->
    <div class="dynamic-island"></div>

    <!-- Status Bar -->
    <div class="status-bar">
      <span class="status-time">9:41</span>
      <div class="status-icons">
        <svg viewBox="0 0 18 18"><path d="M1 9h2v9H1zM5 6h2v12H5zM9 3h2v15H9zM13 0h2v18h-2z" fill="currentColor"/></svg>
        <svg viewBox="0 0 18 12"><path d="M1 4.5C4 1.5 7 1 9 1s5 .5 8 3.5" stroke="currentColor" fill="none" stroke-width="1.8" stroke-linecap="round"/><path d="M3 7C5 5 7 4.5 9 4.5S13 5 15 7" stroke="currentColor" fill="none" stroke-width="1.8" stroke-linecap="round"/><path d="M5 9.5C6.5 8.5 7.5 8 9 8s2.5 .5 4 1.5" stroke="currentColor" fill="none" stroke-width="1.8" stroke-linecap="round"/><circle cx="15.5" cy="2.5" r="1.5" fill="currentColor"/></svg>
        <svg viewBox="0 0 18 10"><rect x="1" y="1" width="14" height="8" rx="1.5" stroke="currentColor" fill="none" stroke-width="1.2"/><rect x="2" y="2" width="10" height="6" rx="1" fill="currentColor"/><path d="M17 3.5v3" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
      </div>
    </div>

    <!-- Scrollable Content -->
    <div class="content">

      <!-- Header -->
      <div class="header" data-od-id="header">
        <div class="header-left">
          <svg class="header-heart" viewBox="0 0 24 24"><path d="M12 21C12 21 3 13.5 3 8.5 3 5.5 5.5 3 8.5 3c2 0 3.5 1.5 3.5 1.5S13.5 3 15.5 3 21 5.5 21 8.5C21 13.5 12 21 12 21z"/></svg>
          <h1 class="header-title">Favorites</h1>
        </div>
        <span class="count-badge">6</span>
      </div>

      <!-- Product Grid -->
      <div class="grid-2" data-od-id="product-grid">

        <!-- Product 1 -->
        <div class="card">
          <div class="ph-img">
            <svg viewBox="0 0 24 24"><path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/><path d="M19 10v2a7 7 0 0 1-14 0v-2"/><line x1="12" y1="19" x2="12" y2="23"/><line x1="8" y1="23" x2="16" y2="23"/></svg>
            <button class="card-fav" aria-label="Remove from favorites">
              <svg viewBox="0 0 24 24"><path d="M12 21C12 21 3 13.5 3 8.5 3 5.5 5.5 3 8.5 3c2 0 3.5 1.5 3.5 1.5S13.5 3 15.5 3 21 5.5 21 8.5C21 13.5 12 21 12 21z"/></svg>
            </button>
          </div>
          <div class="card-body">
            <div class="card-name">Wireless Earbuds TWS</div>
            <div class="card-price"><span class="num">GH₵ 249.00</span></div>
          </div>
        </div>

        <!-- Product 2 -->
        <div class="card">
          <div class="ph-img">
            <svg viewBox="0 0 24 24"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
            <button class="card-fav" aria-label="Remove from favorites">
              <svg viewBox="0 0 24 24"><path d="M12 21C12 21 3 13.5 3 8.5 3 5.5 5.5 3 8.5 3c2 0 3.5 1.5 3.5 1.5S13.5 3 15.5 3 21 5.5 21 8.5C21 13.5 12 21 12 21z"/></svg>
            </button>
          </div>
          <div class="card-body">
            <div class="card-name">Campus Hoodie — Navy</div>
            <div class="card-price"><span class="num">GH₵ 185.00</span></div>
          </div>
        </div>

        <!-- Product 3 -->
        <div class="card">
          <div class="ph-img">
            <svg viewBox="0 0 24 24"><rect x="4" y="2" width="16" height="20" rx="2"/><line x1="8" y1="6" x2="16" y2="6"/><line x1="8" y1="10" x2="16" y2="10"/><line x1="8" y1="14" x2="12" y2="14"/></svg>
            <button class="card-fav" aria-label="Remove from favorites">
              <svg viewBox="0 0 24 24"><path d="M12 21C12 21 3 13.5 3 8.5 3 5.5 5.5 3 8.5 3c2 0 3.5 1.5 3.5 1.5S13.5 3 15.5 3 21 5.5 21 8.5C21 13.5 12 21 12 21z"/></svg>
            </button>
          </div>
          <div class="card-body">
            <div class="card-name">Mechanical Keyboard RGB</div>
            <div class="card-price"><span class="num">GH₵ 320.00</span></div>
          </div>
        </div>

        <!-- Product 4 -->
        <div class="card">
          <div class="ph-img">
            <svg viewBox="0 0 24 24"><rect x="2" y="6" width="20" height="12" rx="2"/><line x1="6" y1="12" x2="6" y2="12.01" stroke-linecap="round" stroke-width="2"/><line x1="10" y1="12" x2="10" y2="12.01" stroke-linecap="round" stroke-width="2"/><line x1="14" y1="12" x2="14" y2="12.01" stroke-linecap="round" stroke-width="2"/><line x1="18" y1="12" x2="18" y2="12.01" stroke-linecap="round" stroke-width="2"/><line x1="8" y1="18" x2="8" y2="18.01" stroke-linecap="round" stroke-width="2"/><line x1="12" y1="18" x2="12" y2="18.01" stroke-linecap="round" stroke-width="2"/><line x1="16" y1="18" x2="16" y2="18.01" stroke-linecap="round" stroke-width="2"/></svg>
            <button class="card-fav" aria-label="Remove from favorites">
              <svg viewBox="0 0 24 24"><path d="M12 21C12 21 3 13.5 3 8.5 3 5.5 5.5 3 8.5 3c2 0 3.5 1.5 3.5 1.5S13.5 3 15.5 3 21 5.5 21 8.5C21 13.5 12 21 12 21z"/></svg>
            </button>
          </div>
          <div class="card-body">
            <div class="card-name">USB-C Hub 7-in-1</div>
            <div class="card-price"><span class="num">GH₵ 145.00</span></div>
          </div>
        </div>

        <!-- Product 5 -->
        <div class="card">
          <div class="ph-img">
            <svg viewBox="0 0 24 24"><path d="M12 2v20M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/></svg>
            <button class="card-fav" aria-label="Remove from favorites">
              <svg viewBox="0 0 24 24"><path d="M12 21C12 21 3 13.5 3 8.5 3 5.5 5.5 3 8.5 3c2 0 3.5 1.5 3.5 1.5S13.5 3 15.5 3 21 5.5 21 8.5C21 13.5 12 21 12 21z"/></svg>
            </button>
          </div>
          <div class="card-body">
            <div class="card-name">Desk Lamp LED</div>
            <div class="card-price"><span class="num">GH₵ 89.00</span></div>
          </div>
        </div>

        <!-- Product 6 -->
        <div class="card">
          <div class="ph-img">
            <svg viewBox="0 0 24 24"><rect x="3" y="3" width="18" height="18" rx="2"/><line x1="8" y1="8" x2="16" y2="8"/><line x1="8" y1="12" x2="16" y2="12"/><line x1="8" y1="16" x2="12" y2="16"/></svg>
            <button class="card-fav" aria-label="Remove from favorites">
              <svg viewBox="0 0 24 24"><path d="M12 21C12 21 3 13.5 3 8.5 3 5.5 5.5 3 8.5 3c2 0 3.5 1.5 3.5 1.5S13.5 3 15.5 3 21 5.5 21 8.5C21 13.5 12 21 12 21z"/></svg>
            </button>
          </div>
          <div class="card-body">
            <div class="card-name">Notebook Set ×5</div>
            <div class="card-price"><span class="num">GH₵ 45.00</span></div>
          </div>
        </div>

      </div>
    </div>

    <!-- Tab Bar -->
    <div class="tabbar" data-od-id="tabbar">
      <button class="tab-item" aria-label="Home">
        <svg viewBox="0 0 24 24"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
        <span>Home</span>
      </button>
      <button class="tab-item" aria-label="Shop">
        <svg viewBox="0 0 24 24"><path d="M6 2L3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4z"/><line x1="3" y1="6" x2="21" y2="6"/><path d="M16 10a4 4 0 0 1-8 0"/></svg>
        <span>Shop</span>
      </button>
      <button class="tab-item active" aria-label="Favorites">
        <svg class="fav-tab-icon" viewBox="0 0 24 24"><path d="M12 21C12 21 3 13.5 3 8.5 3 5.5 5.5 3 8.5 3c2 0 3.5 1.5 3.5 1.5S13.5 3 15.5 3 21 5.5 21 8.5C21 13.5 12 21 12 21z"/></svg>
        <span>Favorites</span>
      </button>
      <button class="tab-item" aria-label="Profile">
        <svg viewBox="0 0 24 24"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
        <span>Profile</span>
      </button>
    </div>

    <!-- Home Indicator -->
    <div class="home-indicator"></div>

  </div>
</div>

</body>
</html>
