<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BexieMart Forgot Password Screen</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Raleway:wght@300;400;600;700&family=Nunito:wght@300;400;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #FFFFFF;
      --surface: #FFFFFF;
      --fg: #111322;
      --muted: #5F6C7B;
      --border: #E4E7EC;
      --accent: #004CFF;
      --font-display: 'Raleway', Georgia, serif;
      --font-body: 'Nunito', -apple-system, system-ui, sans-serif;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: #F2F2F7;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 20px;
    }

    .iphone-frame {
      width: 390px;
      height: 844px;
      border-radius: 55px;
      border: 14px solid #1C1C1E;
      overflow: hidden;
      position: relative;
      background: var(--bg);
      box-shadow: 0 10px 30px rgba(0,0,0,0.2);
    }

    .status-bar {
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 59px;
      padding: 0 24px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      background: var(--bg);
      z-index: 10;
    }

    .time {
      font-family: var(--font-body);
      font-size: 17px;
      font-weight: 600;
      color: var(--fg);
    }

    .status-icons {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .status-icons svg {
      display: block;
    }

    .main-content {
      position: absolute;
      top: 59px;
      bottom: 34px;
      left: 0;
      right: 0;
      overflow-y: auto;
      -webkit-overflow-scrolling: touch;
      padding: 0 24px;
    }

    .header-row {
      display: flex;
      align-items: center;
      gap: 8px;
      padding-top: 16px;
      min-height: 44px;
    }

    .back-btn {
      display: flex;
      align-items: center;
      gap: 4px;
      background: none;
      border: none;
      cursor: pointer;
      font-family: var(--font-body);
      font-size: 17px;
      font-weight: 400;
      color: var(--fg);
      padding: 8px 0;
      min-height: 44px;
      text-decoration: none;
    }

    .back-btn svg {
      display: block;
    }

    .illustration-section {
      display: flex;
      justify-content: center;
      margin-top: 32px;
      margin-bottom: 32px;
    }

    .illustration-box {
      width: 250px;
      height: 250px;
      background: #F5F5F7;
      border-radius: 20px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .illustration-box svg {
      display: block;
    }

    .title-section {
      text-align: center;
    }

    .title {
      font-family: var(--font-display);
      font-size: 24px;
      font-weight: 700;
      color: var(--fg);
    }

    .description {
      font-family: var(--font-body);
      font-size: 16px;
      font-weight: 400;
      color: var(--muted);
      margin-top: 12px;
      line-height: 1.5;
    }

    .form-section {
      margin-top: 40px;
      display: flex;
      flex-direction: column;
      gap: 24px;
    }

    .input-group {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .input-label {
      font-family: var(--font-body);
      font-size: 15px;
      font-weight: 600;
      color: var(--fg);
    }

    .form-input {
      width: 100%;
      height: 52px;
      border: 1.5px solid var(--border);
      border-radius: 12px;
      padding: 0 16px;
      font-family: var(--font-body);
      font-size: 17px;
      font-weight: 400;
      color: var(--fg);
      background: var(--surface);
      outline: none;
      transition: border-color 0.2s;
    }

    .form-input::placeholder {
      color: var(--muted);
    }

    .form-input:focus {
      border-color: var(--accent);
    }

    .send-btn {
      width: 100%;
      height: 54px;
      background: var(--accent);
      color: white;
      border: none;
      border-radius: 12px;
      font-family: var(--font-body);
      font-size: 17px;
      font-weight: 600;
      cursor: pointer;
      margin-top: 16px;
      min-height: 44px;
    }

    .home-indicator {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      height: 34px;
      display: flex;
      justify-content: center;
      align-items: center;
      z-index: 10;
    }

    .home-indicator-bar {
      width: 134px;
      height: 5px;
      background: #1C1C1E;
      border-radius: 2.5px;
    }
  </style>
</head>
<body>
  <div class="iphone-frame" data-od-id="iphone-frame">
    <div class="status-bar" data-od-id="status-bar">
      <span class="time">9:41</span>
      <div class="status-icons">
        <svg class="cellular" width="16" height="16" viewBox="0 0 16 16" fill="none">
          <rect x="0" y="10" width="3" height="6" rx="0.5" fill="#111322"/>
          <rect x="4.5" y="7" width="3" height="9" rx="0.5" fill="#111322"/>
          <rect x="9" y="4" width="3" height="12" rx="0.5" fill="#111322"/>
          <rect x="13.5" y="0" width="3" height="16" rx="0.5" fill="#111322"/>
        </svg>
        <svg class="wifi" width="16" height="16" viewBox="0 0 16 16" fill="none">
          <path d="M8 2C5.2 2 2.6 3.1 0.8 4.8L2.2 6.2C3.6 4.9 5.7 4 8 4C10.3 4 12.4 4.9 13.8 6.2L15.2 4.8C13.4 3.1 10.8 2 8 2Z" fill="#111322"/>
          <path d="M8 6C6.3 6 4.8 6.6 3.7 7.7L5.1 9.1C5.7 8.5 6.8 8 8 8C9.2 8 10.3 8.5 10.9 9.1L12.3 7.7C11.2 6.6 9.7 6 8 6Z" fill="#111322"/>
          <circle cx="8" cy="12" r="2" fill="#111322"/>
        </svg>
        <svg class="battery" width="24" height="12" viewBox="0 0 24 12" fill="none">
          <rect x="0" y="0" width="21" height="12" rx="2" stroke="#111322" stroke-width="1.5"/>
          <rect x="2" y="2" width="17" height="8" rx="1" fill="#111322"/>
          <rect x="21" y="4" width="3" height="4" rx="1" fill="#111322"/>
        </svg>
      </div>
    </div>

    <div class="main-content" data-od-id="main-content">
      <div class="header-row" data-od-id="header-row">
        <a href="#" class="back-btn" data-od-id="back-btn">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none">
            <path d="M15 19L8 12L15 5" stroke="#111322" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
          <span>Back</span>
        </a>
      </div>

      <div class="illustration-section" data-od-id="illustration-section">
        <div class="illustration-box" data-od-id="illustration-box">
          <svg width="120" height="120" viewBox="0 0 120 120" fill="none">
            <rect x="30" y="52" width="60" height="46" rx="6" stroke="#5F6C7B" stroke-width="2.5"/>
            <circle cx="60" cy="40" r="14" stroke="#5F6C7B" stroke-width="2.5"/>
            <path d="M54 40H66" stroke="#5F6C7B" stroke-width="2.5" stroke-linecap="round"/>
            <path d="M60 26V26.01" stroke="#5F6C7B" stroke-width="2.5" stroke-linecap="round"/>
            <path d="M48.5 74H71.5" stroke="#5F6C7B" stroke-width="2.5" stroke-linecap="round"/>
            <circle cx="60" cy="85" r="3" fill="#5F6C7B"/>
            <path d="M60 82V78" stroke="#5F6C7B" stroke-width="2" stroke-linecap="round"/>
          </svg>
        </div>
      </div>

      <div class="title-section" data-od-id="title-section">
        <h1 class="title" data-od-id="title">Forgot Password?</h1>
        <p class="description" data-od-id="description">Enter your email address and we'll send you a reset code.</p>
      </div>

      <div class="form-section" data-od-id="form-section">
        <div class="input-group" data-od-id="email-group">
          <label class="input-label" for="email" data-od-id="email-label">Email</label>
          <input type="email" id="email" class="form-input" placeholder="Enter your email address" data-od-id="email-input">
        </div>

        <button class="send-btn" data-od-id="send-btn">Send Reset Link</button>
      </div>
    </div>

    <div class="home-indicator" data-od-id="home-indicator">
      <div class="home-indicator-bar"></div>
    </div>
  </div>
</body>
</html>
