<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BexieMart – Register</title>
<link href="https://fonts.googleapis.com/css2?family=Raleway:wght@700&family=Nunito:wght@300;400;600&display=swap" rel="stylesheet">
<style>
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
  :root{
    --bg:#FFFFFF;--surface:#FFFFFF;--fg:#111322;--muted:#5F6C7B;
    --border:#E4E7EC;--accent:#004CFF;
    --font-display:'Raleway',Georgia,serif;
    --font-body:'Nunito',-apple-system,system-ui,sans-serif;
  }
  html,body{height:100%;font-family:var(--font-body);color:var(--fg);background:#0d0d0d}

  /* iPhone 15 Pro frame */
  .device{
    position:relative;width:393px;height:852px;margin:32px auto;
    background:var(--bg);border-radius:55px;
    box-shadow:0 0 0 3px #333,0 0 0 6px #1a1a1a;
    overflow:hidden;display:flex;flex-direction:column;
  }
  /* Dynamic Island */
  .dynamic-island{
    position:absolute;top:12px;left:50%;transform:translateX(-50%);
    width:126px;height:36px;background:#000;border-radius:20px;z-index:99;
  }
  /* Status bar */
  .status-bar{
    display:flex;justify-content:space-between;align-items:center;
    padding:59px 28px 8px;font-size:15px;font-weight:600;
    background:var(--bg);position:relative;z-index:10;
  }
  .status-bar .time{font-family:-apple-system,BlinkMacSystemFont,sans-serif;font-size:16px;font-weight:600}
  .status-bar .icons{display:flex;gap:6px;align-items:center}
  .status-bar .icons svg{width:18px;height:18px;fill:var(--fg)}

  /* Scrollable content */
  .scroll-area{
    flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;
    padding:0 24px 24px;
  }
  .scroll-area::-webkit-scrollbar{display:none}
  .scroll-area{-ms-overflow-style:none;scrollbar-width:none}

  /* Header */
  .header{display:flex;align-items:center;gap:6px;margin-bottom:28px;padding-top:8px}
  .header button{
    display:flex;align-items:center;gap:4px;background:none;border:none;
    font-family:var(--font-body);font-size:16px;font-weight:600;color:var(--fg);
    cursor:pointer;padding:8px 4px;border-radius:8px;
    min-height:44px;min-width:44px;justify-content:center;
  }
  .header button svg{width:20px;height:20px;stroke:var(--fg);fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}

  /* Title */
  .title-section{margin-bottom:32px}
  .title{font-family:var(--font-display);font-size:24px;font-weight:700;line-height:1.2;margin-bottom:6px}
  .subtitle{font-family:var(--font-body);font-size:19px;font-weight:300;color:var(--muted)}

  /* Form */
  .form{display:flex;flex-direction:column;gap:20px;margin-bottom:24px}
  .field{display:flex;flex-direction:column;gap:8px}
  .field label{font-size:14px;font-weight:600;color:var(--fg);letter-spacing:0.01em}
  .field input{
    height:52px;width:100%;padding:0 16px;border:1.5px solid var(--border);
    border-radius:12px;font-family:var(--font-body);font-size:16px;
    color:var(--fg);background:var(--surface);outline:none;
    transition:border-color .15s;
  }
  .field input::placeholder{color:#ACAFB4}
  .field input:focus{border-color:var(--accent)}

  /* Role selector */
  .role-section{margin-bottom:28px}
  .role-label{font-size:14px;font-weight:600;margin-bottom:12px;color:var(--fg)}
  .role-cards{display:grid;grid-template-columns:1fr 1fr;gap:12px}
  .role-card{
    display:flex;flex-direction:column;align-items:center;gap:10px;
    padding:20px 12px;border-radius:16px;border:2px solid var(--border);
    background:var(--surface);cursor:pointer;transition:border-color .15s;
    min-height:44px;text-align:center;
  }
  .role-card.selected{border-color:var(--accent)}
  .role-card svg{width:28px;height:28px}
  .role-card .role-title{font-size:15px;font-weight:700;color:var(--fg)}
  .role-card .role-desc{font-size:13px;font-weight:400;color:var(--muted);line-height:1.3}

  /* Create Account button */
  .btn-primary{
    width:100%;height:52px;border:none;border-radius:12px;
    background:var(--accent);color:#fff;font-family:var(--font-body);
    font-size:17px;font-weight:600;cursor:pointer;
    display:flex;align-items:center;justify-content:center;
    min-height:44px;transition:opacity .15s;
  }
  .btn-primary:active{opacity:.85}

  /* Bottom link */
  .bottom-link{
    text-align:center;margin-top:24px;padding-bottom:16px;
    font-size:15px;color:var(--muted);font-weight:400;
  }
  .bottom-link a{color:var(--fg);font-weight:600;text-decoration:none}

  /* Home indicator */
  .home-indicator{
    height:34px;display:flex;align-items:center;justify-content:center;
    background:var(--bg);flex-shrink:0;
  }
  .home-indicator::after{
    content:'';display:block;width:134px;height:5px;
    background:var(--fg);border-radius:3px;opacity:.25;
  }

  /* SVG status icons */
  .battery{display:flex;align-items:center;gap:2px}
  .battery-body{width:25px;height:12px;border:1.5px solid var(--fg);border-radius:3px;position:relative;display:flex;align-items:center;padding:1.5px}
  .battery-body::after{content:'';position:absolute;right:-4px;top:50%;transform:translateY(-50%);width:2px;height:5px;background:var(--fg);border-radius:0 1px 1px 0}
  .battery-fill{width:70%;height:100%;background:var(--fg);border-radius:1.5px}
</style>
</head>
<body>

<div class="device" data-od-id="iphone-15-pro-frame">
  <!-- Dynamic Island -->
  <div class="dynamic-island" data-od-id="dynamic-island"></div>

  <!-- Status Bar -->
  <div class="status-bar" data-od-id="status-bar">
    <span class="time">9:41</span>
    <div class="icons">
      <!-- Cellular -->
      <svg width="18" height="18" viewBox="0 0 18 18" fill="none">
        <rect x="1" y="13" width="3" height="4" rx="0.5" fill="var(--fg)"/>
        <rect x="5.5" y="10" width="3" height="7" rx="0.5" fill="var(--fg)"/>
        <rect x="10" y="6" width="3" height="11" rx="0.5" fill="var(--fg)"/>
        <rect x="14.5" y="2" width="3" height="15" rx="0.5" fill="var(--fg)"/>
      </svg>
      <!-- WiFi -->
      <svg width="18" height="18" viewBox="0 0 18 18" fill="none">
        <path d="M9 15.5a1.5 1.5 0 100-3 1.5 1.5 0 000 3z" fill="var(--fg)"/>
        <path d="M9 11.5c-1.38 0-2.5 1.12-2.5 2.5H5c0-2.21 1.79-4 4-4v2.5z" fill="var(--fg)"/>
        <path d="M9 7.5c-2.76 0-5 2.24-5 5h2.5c0-1.93 1.57-3.5 3.5-3.5V7.5z" fill="var(--fg)"/>
        <path d="M9 3.5c-4.14 0-7.5 3.36-7.5 7.5h2.5c0-2.75 2.24-5 5-5V3.5z" fill="var(--fg)"/>
      </svg>
      <!-- Battery -->
      <div class="battery">
        <div class="battery-body"><div class="battery-fill"></div></div>
      </div>
    </div>
  </div>

  <!-- Scrollable Content -->
  <div class="scroll-area" data-od-id="scroll-area">
    <!-- Header -->
    <div class="header" data-od-id="header">
      <button aria-label="Go back">
        <svg viewBox="0 0 24 24"><polyline points="15 18 9 12 15 6"/></svg>
        Back
      </button>
    </div>

    <!-- Title -->
    <div class="title-section" data-od-id="title-section">
      <h1 class="title">Create Account</h1>
      <p class="subtitle">Join the campus marketplace</p>
    </div>

    <!-- Form -->
    <form class="form" data-od-id="register-form" onsubmit="return false">
      <div class="field" data-od-id="field-fullname">
        <label for="fullname">Full Name</label>
        <input id="fullname" type="text" placeholder="Enter your full name" autocomplete="name">
      </div>
      <div class="field" data-od-id="field-email">
        <label for="email">Email</label>
        <input id="email" type="email" placeholder="Enter your email" autocomplete="email">
      </div>
      <div class="field" data-od-id="field-phone">
        <label for="phone">Phone</label>
        <input id="phone" type="tel" placeholder="Enter your phone number" autocomplete="tel">
      </div>
      <div class="field" data-od-id="field-password">
        <label for="password">Password</label>
        <input id="password" type="password" placeholder="Create a password" autocomplete="new-password">
      </div>
      <div class="field" data-od-id="field-confirm">
        <label for="confirm">Confirm Password</label>
        <input id="confirm" type="password" placeholder="Re-enter your password" autocomplete="new-password">
      </div>
    </form>

    <!-- Role Selector -->
    <div class="role-section" data-od-id="role-selector">
      <div class="role-label">I want to</div>
      <div class="role-cards">
        <!-- Shop card (selected) -->
        <div class="role-card selected" data-od-id="role-shop" onclick="selectRole(this)">
          <!-- shopping-bag SVG -->
          <svg viewBox="0 0 28 28" fill="none" stroke="var(--fg)" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
            <path d="M7 9l1.5-4.5A2 2 0 0110.4 3h7.2a2 2 0 011.9 1.5L21 9"/>
            <path d="M6 9h16l-1.5 14a2 2 0 01-2 1.8H9.5a2 2 0 01-2-1.8L6 9z"/>
            <circle cx="11" cy="14" r="1.5"/>
            <circle cx="17" cy="14" r="1.5"/>
          </svg>
          <div class="role-title">Shop</div>
          <div class="role-desc">Browse &amp; buy</div>
        </div>
        <!-- Sell card (unselected) -->
        <div class="role-card" data-od-id="role-sell" onclick="selectRole(this)">
          <!-- storefront SVG -->
          <svg viewBox="0 0 28 28" fill="none" stroke="var(--fg)" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
            <path d="M3 10l1.5-4.5A2 2 0 016.9 4h14.2a2 2 0 011.9 1.5L24 10"/>
            <path d="M3 10h22v3a2 2 0 01-2 2h-3v6a2 2 0 01-2 2h-8a2 2 0 01-2-2v-6H5a2 2 0 01-2-2v-3z"/>
            <path d="M9 15h10"/>
          </svg>
          <div class="role-title">Sell</div>
          <div class="role-desc">List products</div>
        </div>
      </div>
    </div>

    <!-- Create Account Button -->
    <button class="btn-primary" data-od-id="btn-create-account">Create Account</button>

    <!-- Bottom link -->
    <div class="bottom-link" data-od-id="bottom-link">
      Already have an account? <a href="#">Login</a>
    </div>
  </div>

  <!-- Home Indicator -->
  <div class="home-indicator" data-od-id="home-indicator"></div>
</div>

<script>
function selectRole(card){
  document.querySelectorAll('.role-card').forEach(c=>c.classList.remove('selected'));
  card.classList.add('selected');
}
</script>
</body>
</html>
