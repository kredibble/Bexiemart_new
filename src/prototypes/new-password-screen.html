<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BexieMart New Password Screen</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Raleway:wght@300;400;600;700&family=Nunito:wght@300;400;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #FFFFFF;
      --surface: #FFFFFF;
      --fg: #111322;
      --muted: #5F6C7B;
      --border: #E4E7EC;
      --accent: #004CFF;
      --font-display: 'Raleway', Georgia, serif;
      --font-body: 'Nunito', -apple-system, system-ui, sans-serif;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: #F2F2F7;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 20px;
    }

    .iphone-frame {
      width: 390px;
      height: 844px;
      border-radius: 55px;
      border: 14px solid #1C1C1E;
      overflow: hidden;
      position: relative;
      background: var(--bg);
      box-shadow: 0 10px 30px rgba(0,0,0,0.2);
    }

    .status-bar {
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 59px;
      padding: 0 24px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      background: var(--bg);
      z-index: 10;
    }

    .time {
      font-family: var(--font-body);
      font-size: 17px;
      font-weight: 600;
      color: var(--fg);
    }

    .status-icons {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .status-icons svg {
      display: block;
    }

    .main-content {
      position: absolute;
      top: 59px;
      bottom: 34px;
      left: 0;
      right: 0;
      overflow-y: auto;
      -webkit-overflow-scrolling: touch;
      padding: 0 24px;
    }

    .header-row {
      display: flex;
      align-items: center;
      gap: 8px;
      padding-top: 16px;
      min-height: 44px;
    }

    .back-btn {
      display: flex;
      align-items: center;
      gap: 4px;
      background: none;
      border: none;
      cursor: pointer;
      font-family: var(--font-body);
      font-size: 17px;
      font-weight: 400;
      color: var(--fg);
      padding: 8px 0;
      min-height: 44px;
      text-decoration: none;
    }

    .back-btn svg {
      display: block;
    }

    .title-section {
      margin-top: 32px;
    }

    .title {
      font-family: var(--font-display);
      font-size: 24px;
      font-weight: 700;
      color: var(--fg);
    }

    .subtitle {
      font-family: var(--font-body);
      font-size: 19px;
      font-weight: 300;
      color: var(--muted);
      margin-top: 8px;
      line-height: 1.5;
    }

    .form-section {
      margin-top: 40px;
      display: flex;
      flex-direction: column;
      gap: 24px;
    }

    .input-group {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .input-label {
      font-family: var(--font-body);
      font-size: 15px;
      font-weight: 600;
      color: var(--fg);
    }

    .input-wrapper {
      position: relative;
      width: 100%;
    }

    .form-input {
      width: 100%;
      height: 52px;
      border: 1.5px solid var(--border);
      border-radius: 12px;
      padding: 0 48px 0 16px;
      font-family: var(--font-body);
      font-size: 17px;
      font-weight: 400;
      color: var(--fg);
      background: var(--surface);
      outline: none;
      transition: border-color 0.2s;
    }

    .form-input::placeholder {
      color: var(--muted);
    }

    .form-input:focus {
      border-color: var(--accent);
    }

    .eye-toggle {
      position: absolute;
      right: 16px;
      top: 50%;
      transform: translateY(-50%);
      background: none;
      border: none;
      cursor: pointer;
      padding: 8px;
      min-height: 44px;
      min-width: 44px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .eye-toggle svg {
      display: block;
    }

    .reset-btn {
      width: 100%;
      height: 54px;
      background: var(--accent);
      color: white;
      border: none;
      border-radius: 12px;
      font-family: var(--font-body);
      font-size: 17px;
      font-weight: 600;
      cursor: pointer;
      margin-top: 16px;
      min-height: 44px;
    }

    .home-indicator {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      height: 34px;
      display: flex;
      justify-content: center;
      align-items: center;
      z-index: 10;
    }

    .home-indicator-bar {
      width: 134px;
      height: 5px;
      background: #1C1C1E;
      border-radius: 2.5px;
    }
  </style>
</head>
<body>
  <div class="iphone-frame" data-od-id="iphone-frame">
    <div class="status-bar" data-od-id="status-bar">
      <span class="time">9:41</span>
      <div class="status-icons">
        <svg class="cellular" width="16" height="16" viewBox="0 0 16 16" fill="none">
          <rect x="0" y="10" width="3" height="6" rx="0.5" fill="#111322"/>
          <rect x="4.5" y="7" width="3" height="9" rx="0.5" fill="#111322"/>
          <rect x="9" y="4" width="3" height="12" rx="0.5" fill="#111322"/>
          <rect x="13.5" y="0" width="3" height="16" rx="0.5" fill="#111322"/>
        </svg>
        <svg class="wifi" width="16" height="16" viewBox="0 0 16 16" fill="none">
          <path d="M8 2C5.2 2 2.6 3.1 0.8 4.8L2.2 6.2C3.6 4.9 5.7 4 8 4C10.3 4 12.4 4.9 13.8 6.2L15.2 4.8C13.4 3.1 10.8 2 8 2Z" fill="#111322"/>
          <path d="M8 6C6.3 6 4.8 6.6 3.7 7.7L5.1 9.1C5.7 8.5 6.8 8 8 8C9.2 8 10.3 8.5 10.9 9.1L12.3 7.7C11.2 6.6 9.7 6 8 6Z" fill="#111322"/>
          <circle cx="8" cy="12" r="2" fill="#111322"/>
        </svg>
        <svg class="battery" width="24" height="12" viewBox="0 0 24 12" fill="none">
          <rect x="0" y="0" width="21" height="12" rx="2" stroke="#111322" stroke-width="1.5"/>
          <rect x="2" y="2" width="17" height="8" rx="1" fill="#111322"/>
          <rect x="21" y="4" width="3" height="4" rx="1" fill="#111322"/>
        </svg>
      </div>
    </div>

    <div class="main-content" data-od-id="main-content">
      <div class="header-row" data-od-id="header-row">
        <a href="#" class="back-btn" data-od-id="back-btn">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none">
            <path d="M15 19L8 12L15 5" stroke="#111322" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
          <span>Back</span>
        </a>
      </div>

      <div class="title-section" data-od-id="title-section">
        <h1 class="title" data-od-id="title">Set New Password</h1>
        <p class="subtitle" data-od-id="subtitle">Create a strong password for your account</p>
      </div>

      <div class="form-section" data-od-id="form-section">
        <div class="input-group" data-od-id="new-password-group">
          <label class="input-label" for="new-password" data-od-id="new-password-label">New Password</label>
          <div class="input-wrapper" data-od-id="new-password-wrapper">
            <input type="password" id="new-password" class="form-input" placeholder="Create a new password" data-od-id="new-password-input">
            <button type="button" class="eye-toggle" data-od-id="new-password-toggle" onclick="togglePassword('new-password', this)">
              <svg class="eye-icon" width="20" height="20" viewBox="0 0 20 20" fill="none">
                <path d="M10 4C4 4 1 10 1 10C1 10 4 16 10 16C16 16 19 10 19 10C19 10 16 4 10 4Z" stroke="#5F6C7B" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
                <circle cx="10" cy="10" r="3" stroke="#5F6C7B" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
              </svg>
            </button>
          </div>
        </div>

        <div class="input-group" data-od-id="confirm-password-group">
          <label class="input-label" for="confirm-password" data-od-id="confirm-password-label">Confirm New Password</label>
          <div class="input-wrapper" data-od-id="confirm-password-wrapper">
            <input type="password" id="confirm-password" class="form-input" placeholder="Re-enter your new password" data-od-id="confirm-password-input">
            <button type="button" class="eye-toggle" data-od-id="confirm-password-toggle" onclick="togglePassword('confirm-password', this)">
              <svg class="eye-icon" width="20" height="20" viewBox="0 0 20 20" fill="none">
                <path d="M10 4C4 4 1 10 1 10C1 10 4 16 10 16C16 16 19 10 19 10C19 10 16 4 10 4Z" stroke="#5F6C7B" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
                <circle cx="10" cy="10" r="3" stroke="#5F6C7B" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
              </svg>
            </button>
          </div>
        </div>

        <button class="reset-btn" data-od-id="reset-btn">Reset Password</button>
      </div>
    </div>

    <div class="home-indicator" data-od-id="home-indicator">
      <div class="home-indicator-bar"></div>
    </div>
  </div>

  <script>
    function togglePassword(inputId, button) {
      const input = document.getElementById(inputId);
      const eyeIcon = button.querySelector('.eye-icon');

      if (input.type === 'password') {
        input.type = 'text';
        eyeIcon.innerHTML = '<path d="M1 1L19 19" stroke="#5F6C7B" stroke-width="1.5" stroke-linecap="round"/><path d="M10 4C4 4 1 10 1 10C1 10 4 16 10 16C16 16 19 10 19 10C19 10 16 4 10 4Z" stroke="#5F6C7B" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/><circle cx="10" cy="10" r="3" stroke="#5F6C7B" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>';
      } else {
        input.type = 'password';
        eyeIcon.innerHTML = '<path d="M10 4C4 4 1 10 1 10C1 10 4 16 10 16C16 16 19 10 19 10C19 10 16 4 10 4Z" stroke="#5F6C7B" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/><circle cx="10" cy="10" r="3" stroke="#5F6C7B" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>';
      }
    }
  </script>
</body>
</html>
