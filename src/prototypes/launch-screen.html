<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BexieMart Launch Screen</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Raleway:wght@300;600&family=Nunito:wght@300;400;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #FFFFFF;
      --surface: #FFFFFF;
      --fg: #111322;
      --muted: #5F6C7B;
      --border: #E4E7EC;
      --accent: #004CFF;
      --font-display: 'Raleway', Georgia, serif;
      --font-body: 'Nunito', -apple-system, system-ui, sans-serif;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: #F2F2F7;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 20px;
    }

    .iphone-frame {
      width: 390px;
      height: 844px;
      border-radius: 55px;
      border: 14px solid #1C1C1E;
      overflow: hidden;
      position: relative;
      background: var(--bg);
      box-shadow: 0 10px 30px rgba(0,0,0,0.2);
    }

    .status-bar {
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 59px;
      padding: 0 24px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      background: var(--bg);
      z-index: 10;
    }

    .time {
      font-family: var(--font-body);
      font-size: 17px;
      font-weight: 600;
      color: var(--fg);
    }

    .status-icons {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .status-icons svg {
      display: block;
    }

    .main-content {
      position: absolute;
      top: 59px;
      bottom: 34px;
      left: 0;
      right: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 0 24px;
    }

    .content-container {
      max-width: 330px;
      width: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      flex: 1;
      justify-content: center;
    }

    .app-icon {
      width: 100px;
      height: 100px;
      border-radius: 50%;
      background: #F0F0F0;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: var(--font-display);
      font-size: 32px;
      font-weight: 600;
      color: var(--fg);
    }

    .brand-title {
      font-family: var(--font-display);
      font-size: 52px;
      font-weight: 600;
      color: var(--fg);
      margin-top: 24px;
      text-align: center;
    }

    .tagline {
      font-family: var(--font-body);
      font-size: 19px;
      font-weight: 300;
      color: var(--muted);
      text-align: center;
      margin-top: 12px;
      line-height: 1.4;
      max-width: 330px;
    }

    .cta-section {
      width: 100%;
      max-width: 330px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 16px;
      padding-bottom: 20px;
      margin-top: auto;
    }

    .get-started-btn {
      width: 330px;
      height: 54px;
      background: var(--accent);
      color: white;
      border: none;
      border-radius: 12px;
      font-family: var(--font-body);
      font-size: 17px;
      font-weight: 600;
      cursor: pointer;
      min-height: 44px;
    }

    .login-link {
      font-family: var(--font-body);
      font-size: 15px;
      color: var(--muted);
      text-decoration: none;
      display: flex;
      align-items: center;
      gap: 4px;
      min-height: 44px;
      padding: 12px 0;
    }

    .login-link .arrow {
      color: var(--accent);
    }

    .home-indicator {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      height: 34px;
      display: flex;
      justify-content: center;
      align-items: center;
      z-index: 10;
    }

    .home-indicator-bar {
      width: 134px;
      height: 5px;
      background: #1C1C1E;
      border-radius: 2.5px;
    }
  </style>
</head>
<body>
  <div class="iphone-frame" data-od-id="iphone-frame">
    <div class="status-bar" data-od-id="status-bar">
      <span class="time">9:41</span>
      <div class="status-icons">
        <svg class="cellular" width="16" height="16" viewBox="0 0 16 16" fill="none">
          <rect x="0" y="10" width="3" height="6" rx="0.5" fill="#111322"/>
          <rect x="4.5" y="7" width="3" height="9" rx="0.5" fill="#111322"/>
          <rect x="9" y="4" width="3" height="12" rx="0.5" fill="#111322"/>
          <rect x="13.5" y="0" width="3" height="16" rx="0.5" fill="#111322"/>
        </svg>
        <svg class="wifi" width="16" height="16" viewBox="0 0 16 16" fill="none">
          <path d="M8 2C5.2 2 2.6 3.1 0.8 4.8L2.2 6.2C3.6 4.9 5.7 4 8 4C10.3 4 12.4 4.9 13.8 6.2L15.2 4.8C13.4 3.1 10.8 2 8 2Z" fill="#111322"/>
          <path d="M8 6C6.3 6 4.8 6.6 3.7 7.7L5.1 9.1C5.7 8.5 6.8 8 8 8C9.2 8 10.3 8.5 10.9 9.1L12.3 7.7C11.2 6.6 9.7 6 8 6Z" fill="#111322"/>
          <circle cx="8" cy="12" r="2" fill="#111322"/>
        </svg>
        <svg class="battery" width="24" height="12" viewBox="0 0 24 12" fill="none">
          <rect x="0" y="0" width="21" height="12" rx="2" stroke="#111322" stroke-width="1.5"/>
          <rect x="2" y="2" width="17" height="8" rx="1" fill="#111322"/>
          <rect x="21" y="4" width="3" height="4" rx="1" fill="#111322"/>
        </svg>
      </div>
    </div>

    <div class="main-content" data-od-id="main-content">
      <div class="content-container">
        <div class="app-icon" data-od-id="app-icon">BM</div>
        <h1 class="brand-title" data-od-id="brand-title">BexieMart</h1>
        <p class="tagline" data-od-id="tagline">Shop Smart, Live Easy — Your Campus Marketplace</p>
      </div>

      <div class="cta-section" data-od-id="cta-section">
        <button class="get-started-btn" data-od-id="get-started-btn">Get Started</button>
        <a href="#" class="login-link" data-od-id="login-link">
          I already have an account <span class="arrow">→</span>
        </a>
      </div>
    </div>

    <div class="home-indicator" data-od-id="home-indicator">
      <div class="home-indicator-bar"></div>
    </div>
  </div>
</body>
</html>
